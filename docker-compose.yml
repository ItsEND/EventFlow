# PostgreSQL для EventApi — совпадает с ConnectionStrings:DefaultConnection в appsettings.json
# Запуск из корня репозитория: docker compose up -d
# Остановка: docker compose down
# Данные PostgreSQL сохраняются в именованном томе eventapi_pgdata
# Данные pgAdmin сохраняются в именованном томе eventapi_pgadmin_data

services:
  postgres:
    image: postgres:16-alpine
    container_name: eventapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventapi
    ports:
      - "5433:5432"
    volumes:
      - eventapi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventapi"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: eventapi-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eventapi.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - eventapi_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  eventapi_pgdata:
  eventapi_pgadmin_data: